services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mysantex
      POSTGRES_PASSWORD: mysantex123
      POSTGRES_DB: mysantex
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mysantex -d mysantex"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      network: host
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://mysantex:mysantex123@postgres:5432/mysantex?schema=public
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_backups:/app/backups
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      network: host
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  backend_backups:
