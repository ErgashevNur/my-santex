name: CD

on:
  push:
    branches: [main]

jobs:
  # ── Frontend → Nginx (VPS) ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: frontend/dist/
          target: /var/www/my-santex/frontend/
          strip_components: 1

  # ── Backend → VPS (PM2) ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & build
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Sync to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: backend/dist/,backend/package.json,backend/package-lock.json,backend/prisma/
          target: /var/www/my-santex/backend/
          strip_components: 1

      - name: Migrate & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/my-santex/backend
            npm ci --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart my-santex-backend || pm2 start dist/src/main.js --name my-santex-backend
            pm2 save
